server.port=8080
server.servlet.context-path=/api

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

app.thread-pool.core-size=5
app.thread-pool.max-size=15
app.thread-pool.queue-capacity=200
app.thread-pool.keep-alive-seconds=60

# Probability (0.0-1.0) that any given request gets rate-limited
app.inference.rate-limit-every-nth=4
app.inference.mock-delay-min-ms=200
app.inference.mock-delay-max-ms=600

app.retry.max-retries=3
app.retry.backoff-ms=500

logging.level.com.example.promptprocessor=DEBUG
logging.file.name=logs/prompt-processor.log
logging.pattern.console=

# Actuator
management.endpoints.web.exposure.include=health,info,metrics,threaddump,loggers,env
management.endpoint.health.show-details=always
management.endpoint.health.show-components=always
management.info.env.enabled=true
management.endpoints.web.base-path=/actuator
# Keeps management endpoints under the same servlet context as the app (/api/actuator/...)
management.server.base-path=/api

info.app.name=Prompt Processor
info.app.description=Async Prompt Processing with Parallel Workers and Rate-Limit Retry
info.app.version=0.0.1-SNAPSHOT
